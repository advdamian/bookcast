    <section class="flex-grow py-8 px-4">
        <div class="max-w-5xl mx-auto">
            
            <div class="mb-6">
                <a href="../buzz/" class="inline-flex items-center text-slate-600 hover:text-indigo-600 transition font-medium bg-white/50 px-4 py-2 rounded-full border border-white/60 shadow-sm hover:shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Înapoi la Arhivă
                </a>
            </div>

            <div class="bg-white rounded-xl shadow-2xl overflow-hidden border border-slate-200">
                <div style="position: relative; width: 100%; height: 0; padding-top: 141.4286%;
                padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 0; margin-bottom: 0; overflow: hidden;
                will-change: transform;">

    <footer class="bg-slate-900/90 backdrop-blur-md text-gray-300 py-8 text-center border-t border-gray-800">

    <!-- Back to Top Button -->
    <a href="#" id="back-to-top" class="fixed bottom-6 left-6 z-50 bg-white/30 backdrop-blur-md border border-white/40 shadow-lg text-slate-600 hover:text-indigo-600 hover:bg-white/80 px-4 py-2 rounded-full text-sm font-bold transition-all duration-500 flex items-center gap-1 hover:-translate-y-1 hover:shadow-xl opacity-0 pointer-events-none translate-y-10">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg> sus
    </a>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const backToTop = document.getElementById('back-to-top');
            if (backToTop) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 300) {
                        backToTop.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-10');
                    } else {
                        backToTop.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10');
                    }
                });
                backToTop.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        });
    </script>
</body>
